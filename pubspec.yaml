name: guezs_films
description: "Guezs Films - Premium Streaming Application"
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.8

  # State Management & Navigation
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # Architecture
  dartz: ^0.10.1
  equatable: ^2.0.5

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # UI Components
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  flutter_animate: ^4.5.2
  lottie: ^3.1.3

  # Video Player
  video_player: ^2.9.2
  chewie: ^1.8.5

  # Utilities
  intl: any
  logger: ^2.5.0
  connectivity_plus: ^6.1.1
  url_launcher: ^6.3.1
  web: ^1.1.1
  
  # Google Fonts
  google_fonts: ^6.2.1

  # Apple Sign-In
  sign_in_with_apple: ^6.1.3
  crypto: ^3.0.3

  # Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.2
  firebase_storage: ^12.3.2
  google_sign_in: ^6.2.2
  dio: ^5.9.2
  path_provider: ^2.1.5
  flutter_local_notifications: ^21.0.0
  permission_handler: ^12.0.1
  cloud_functions: ^5.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/onboarding/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
    - assets/avatars/

