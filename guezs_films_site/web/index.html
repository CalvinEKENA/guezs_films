<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Découvrez le meilleur du cinéma et des séries exclusives sur Guezs Films. Plongez dans des histoires captivantes comme 'La femme du Mbenguiste'.">
  <meta name="keywords" content="cinéma, séries, films africains, streaming, Guezs Films">
  <meta name="author" content="Guezs Films">

  <!-- Open Graph / Facebook / WhatsApp -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://votre-domaine.com/">
  <meta property="og:title" content="Guezs Films — Le cinéma qui vous ressemble">
  <meta property="og:description" content="Découvrez vos films et séries préférés en haute qualité. Le rendez-vous incontournable des cinéphiles.">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="Guezs Films — Cinéma & Séries exclusives">
  <meta property="twitter:description" content="Le rendez-vous incontournable des cinéphiles.">
  <meta property="twitter:image" content="icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Guezs Films">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Guezs Films — Cinéma & Séries exclusives</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
